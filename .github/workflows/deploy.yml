name: Deploy Frontend to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:  # Permite ejecutar manualmente

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build

      - name: Prepare remote staging and free tmp
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            mkdir -p /home/ec2-user/frontend_deploy
            rm -rf /home/ec2-user/frontend_deploy/*
            # Cleanup safe temp leftovers to avoid scp failures when /tmp is full
            sudo find /tmp -maxdepth 1 -type d -name "frontend_deploy*" -exec rm -rf {} + || true
            sudo find /tmp -maxdepth 1 -type f -name "*.tar.gz" -mtime +1 -delete || true
            df -h /tmp
      
      - name: Upload build to AWS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          source: "dist/*"
          target: "/home/ec2-user/frontend_deploy/"
          tar_tmp_path: "/home/ec2-user/frontend_deploy/"
          strip_components: 1
          overwrite: true
          debug: true
      
      - name: Deploy and set permissions
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            # Move files to final location
            sudo rm -rf /opt/inforysk/frontend/assets /opt/inforysk/frontend/index.html /opt/inforysk/frontend/favicon.ico 2>/dev/null || true
            mkdir -p "$HOME/frontend_deploy"
            sudo mv "$HOME/frontend_deploy"/* /opt/inforysk/frontend/
            sudo chown -R nginx:nginx /opt/inforysk/frontend/
            rm -rf "$HOME/frontend_deploy"
            echo "✅ Frontend deployed successfully!"
